    .method-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1.25rem;
      margin: 1rem auto 1.5rem;
      max-width: 100%;
    }

    /* Baseline comparison: 2-col flow — e.g. Prompt | Input; CCEdit | UniVideo; Cosmos | Ours (or fewer methods per section). */
    .method-grid.layout-single.comparison-rows {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-flow: row;
      align-items: stretch;
    }

    /*
      When showing all 5 methods + Prompt at once, enforce a 2x3 layout:
      Top:    Prompt | Input  | Ours
      Bottom: CCEdit | UniVideo | Cosmos
    */
    .method-grid.layout-single.comparison-rows.comparison-baselines-6 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-areas:
        "prompt input ours"
        "ccedit univideo cosmos";
    }

    .method-grid.layout-single.comparison-rows.comparison-baselines-6 > .comparison-prompt-cell {
      grid-area: prompt;
    }

    .method-grid.layout-single.comparison-rows.comparison-baselines-6 > .method-column[data-method-key="Input"] {
      grid-area: input;
    }

    .method-grid.layout-single.comparison-rows.comparison-baselines-6 > .method-column[data-method-key="Ours"] {
      grid-area: ours;
    }

    .method-grid.layout-single.comparison-rows.comparison-baselines-6 > .method-column[data-method-key="CCEdit"] {
      grid-area: ccedit;
    }

    .method-grid.layout-single.comparison-rows.comparison-baselines-6 > .method-column[data-method-key="UniVideo"] {
      grid-area: univideo;
    }

    .method-grid.layout-single.comparison-rows.comparison-baselines-6 > .method-column[data-method-key="Cosmos"] {
      grid-area: cosmos;
    }

    .comparison-prompt-cell {
      border-radius: 16px;
      border: 1px solid #dbe4ff;
      background: #f8faff;
      padding: 0.5rem 0.4rem 0.6rem;
      box-shadow: 0 6px 18px rgba(74, 97, 155, 0.1);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: stretch;
      min-height: 0;
    }

    .comparison-prompt-box {
      flex: 1 1 auto;
      margin: 0;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 2px solid rgba(50, 115, 220, 0.22);
      background: #ffffff;
      color: #1f2a44;
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
      min-height: 120px;
    }

    /*
      Property gallery “comparison-rows”: keep Prompt | Input / … layout, but (1) cap prompt influence on
      column tracks with min-width:0 + wrapping, and (2) use fixed pixel video tiles instead of width:100%
      so shrinking columns cannot shrink the player boxes.
    */
    .property-gallery .method-grid.layout-single.comparison-rows {
      width: 100%;
      min-width: 0;
      gap: 1.5rem;
    }

    /* Carousel index > 0: only Prompt + Input + Ours — one row, three equal tracks */
    .property-gallery .method-grid.layout-single.comparison-rows.comparison-compact {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .property-gallery .method-grid.layout-single.comparison-rows > .comparison-prompt-cell,
    .property-gallery .method-grid.layout-single.comparison-rows > .method-column {
      min-width: 0;
    }

    .property-gallery .method-grid.layout-single.comparison-rows > .comparison-prompt-cell {
      padding: 0.9rem 0.7rem 1.05rem;
      border-radius: 20px;
    }

    .property-gallery .method-grid.layout-single.comparison-rows > .method-column {
      padding: 1rem 0.7rem 1.2rem;
      gap: 0.75rem;
      border-radius: 20px;
    }

    .property-gallery .method-grid.layout-single.comparison-rows .method-heading {
      font-size: 1.02rem;
      letter-spacing: 0.07em;
    }

    .property-gallery .method-grid.layout-single.comparison-rows .method-variant-stack {
      gap: 0.75rem;
    }

    .property-gallery .method-grid.layout-single.comparison-rows .comparison-prompt-box {
      max-width: 100%;
      overflow-wrap: break-word;
      word-break: break-word;
      min-height: 148px;
      padding: 1rem 1.15rem;
      font-size: 1rem;
      border-radius: 14px;
    }

    .property-gallery .method-grid.layout-single.comparison-rows .method-variant-slot .video-wrapper {
      flex: 0 0 auto;
      box-sizing: border-box;
      width: 280px;
      min-width: 280px;
      max-width: 280px;
      height: auto;
      padding-bottom: 0;
      margin-left: auto;
      margin-right: auto;
      border-radius: 10px;
      /* Taller preview than 16:9-ish tiles so headers + video read as a larger card */
      aspect-ratio: 5 / 4;
    }

        /* Force property specific grid - 4 columns in one row using full width */
    .method-grid.force-layout {
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 100%;
      margin-left: 0;
      margin-right: 0;
    }

    /* On medium screens (tablets), force-layout uses 2 columns */
    @media screen and (max-width: 1200px) and (min-width: 769px) {
      .method-grid.force-layout {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .method-column.is-baseline.baseline-2 {

      border: 2px solid rgba(50, 115, 220, 0.35);
      box-shadow: 0 12px 30px rgba(50, 115, 220, 0.18);
    }

      transform: rotate(180deg);

      letter-spacing: 0.12em;

    .method-column.is-baseline.baseline-1 .variant-tag {

  function createThumbnailFromVideo(src, canvas, button, frameTime) {
    if (!canvas) {
      return;
    }
    const video = document.createElement('video');
    video.preload = 'metadata';
    video.src = src;
    video.muted = true;
    video.playsInline = true;
    
    const drawFrame = () => {
      const context = canvas.getContext('2d');
      const aspect = video.videoWidth && video.videoHeight ? video.videoWidth / video.videoHeight : (16 / 9);
      const targetWidth = 320;
      const targetHeight = targetWidth / aspect;
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      context.drawImage(video, 0, 0, targetWidth, targetHeight);
      if (button) {
        button.classList.remove('loading');
      }
      video.pause();
      video.removeAttribute('src');
      video.load();
    };
    
    let frameCaptured = false;
    
    video.addEventListener('loadedmetadata', () => {
      let seekTime = typeof frameTime === 'number' ? frameTime : 0.15;
      if (video.duration && seekTime > video.duration) {
        seekTime = Math.max(0, video.duration - 0.1);
      }
      video.currentTime = seekTime;
    });
    
    video.addEventListener('seeked', () => {
      if (frameCaptured) {
        return;
      }
      frameCaptured = true;
      drawFrame();
    });
    video.addEventListener('error', () => {
      if (button) {
        button.classList.remove('loading');
        button.classList.add('thumbnail-error');
      }
      video.removeAttribute('src');
    });
  }
  
  function buildPropertyGallery() {
    const getPropertyDisplayName = (property) => {
      if (property && typeof property.displayName === 'string' && property.displayName.trim()) {
        return property.displayName.trim();
      }
      const rawName = (property && (property.name || property.slug)) ? (property.name || property.slug) : 'Sample';
      return String(rawName)
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\b\w/g, (char) => char.toUpperCase());
    };

    PROPERTY_GALLERY_SECTIONS.forEach((section) => {
      const container = document.getElementById(section.containerId);
      if (!container) {
        return;
      }

      section.names.forEach((propertyName) => {
        const property = propertyGalleryData.find((p) => p.name === propertyName);
        if (!property) {
          return;
        }

      const panel = document.createElement('div');
      panel.className = 'property-panel';
      panel.innerHTML = `

          <p class="property-shared-meta"></p>
        </div>
      `;
      
      container.appendChild(panel);
      
      const activeMedia = panel.querySelector('.property-active-media');
      const sharedLabel = panel.querySelector('.property-shared-label');
      const sharedMeta = panel.querySelector('.property-shared-meta');
      const carouselTrack = panel.querySelector('.thumbnail-track');
      const prevButton = panel.querySelector('.property-nav-btn.is-prev');
      const nextButton = panel.querySelector('.property-nav-btn.is-next');
      const dotsContainer = panel.querySelector('.property-dots');
      const propertySlug = (property.slug || property.name || '').toLowerCase().replace(/\s+/g, '');
      const layoutMode = property.layout === 'paired' ? 'paired' : 'single';
      const variantRowCount = layoutMode === 'paired' ? 2 : 1;

      const fullMethodKeys = Array.isArray(property.methodKeys) && property.methodKeys.length
        ? property.methodKeys
        : METHOD_CONFIGS.map((c) => c.key);
      const methodConfigs = METHOD_CONFIGS.filter((c) => fullMethodKeys.includes(c.key));
      const COMPACT_COMPARE_KEYS = ['Input', 'Ours'];
      
      const methodGrid = document.createElement('div');
      methodGrid.className = `method-grid layout-${layoutMode}`;
      let comparisonPromptBox = null;
      if (layoutMode === 'single') {
        methodGrid.classList.add('comparison-rows');
        const promptCell = document.createElement('div');
        promptCell.className = 'comparison-prompt-cell';
        const promptHeading = document.createElement('div');
        promptHeading.className = 'method-heading';
        promptHeading.textContent = 'Prompt';
        comparisonPromptBox = document.createElement('div');
        comparisonPromptBox.className = 'comparison-prompt-box';
        comparisonPromptBox.textContent = '(Prompt placeholder — set `prompt` on each example in propertyGalleryData.)';
        promptCell.appendChild(promptHeading);
        promptCell.appendChild(comparisonPromptBox);
        methodGrid.appendChild(promptCell);
      }
      activeMedia.appendChild(methodGrid);
      
      const methodEntries = [];
      
      methodConfigs.forEach((config, index) => {
        const column = document.createElement('div');
        column.dataset.methodKey = config.key;
        column.className = `method-column ${config.type === 'primary' ? 'is-primary' : 'is-baseline'} ${config.colorClass || ''}`;
        const heading = document.createElement('div');
        heading.className = 'method-heading';
        heading.textContent = config.label;
        column.appendChild(heading);
        
        const stack = document.createElement('div');
        stack.className = 'method-variant-stack';
        column.appendChild(stack);
        
        const variantRefs = [];
        
        for (let rowIndex = 0; rowIndex < variantRowCount; rowIndex += 1) {
          const slot = document.createElement('div');
          slot.className = 'method-variant-slot';
          
          const tag = document.createElement('span');
          tag.className = 'variant-tag';
          slot.appendChild(tag);
          
          const wrapper = document.createElement('div');
          wrapper.className = `video-wrapper ${config.type === 'primary' ? 'property-video-wrapper' : 'baseline-video-wrapper'}`;
          
          const video = document.createElement('video');
          video.controls = true;
          video.preload = 'metadata';
          video.playsInline = true;
          video.autoplay = true;
          video.muted = true;
          video.loop = true;
          if (config.type !== 'primary') {
            video.dataset.model = config.key;
            video.dataset.row = String(rowIndex);
          }
          const source = document.createElement('source');
          source.type = 'video/mp4';
          video.appendChild(source);
          wrapper.appendChild(video);
          slot.appendChild(wrapper);
          
          stack.appendChild(slot);
          
          variantRefs.push({
            slot,
            tagEl: tag,
            video,
            source
          });
        }
        
        methodGrid.appendChild(column);
        methodEntries.push({
          config,
          column,
          headingEl: heading,
          variantRefs
        });
      });
      
      const variantMetaEls = Array.from({ length: variantRowCount }, () => {
        const metaEl = document.createElement('p');
        metaEl.className = 'variant-row-meta is-hidden';

      let extraLabel = null;
      let forceDirectionSelector = null;
      let forceThumbnailImg = null;
      let forceThumbnailContainer = null;
      let forceDirectionInfo = null;
      let currentForceDirection = null;

      if (layoutMode === 'single' && property.extraImageLabel) {
        if (property.hasForceDirections) {
          // Create force direction selector - will be prepended before methodGrid
          forceDirectionSelector = document.createElement('div');
          forceDirectionSelector.className = 'force-direction-selector is-hidden';

          const selectorLabel = document.createElement('span');
          selectorLabel.className = 'force-direction-selector-label';
          selectorLabel.textContent = 'Select Force Direction:';
          forceDirectionSelector.appendChild(selectorLabel);

          forceThumbnailContainer = document.createElement('div');
          forceThumbnailContainer.className = 'force-thumbnail-container';

          forceThumbnailImg = document.createElement('img');
          forceThumbnailImg.className = 'force-thumbnail-img';
          forceThumbnailContainer.appendChild(forceThumbnailImg);

          forceDirectionSelector.appendChild(forceThumbnailContainer);

          forceDirectionInfo = document.createElement('div');
          forceDirectionInfo.className = 'force-direction-info';
          forceDirectionSelector.appendChild(forceDirectionInfo);

          // Prepend to activeMedia (will be before methodGrid)
          activeMedia.insertBefore(forceDirectionSelector, activeMedia.firstChild);
        } else {
          extraBox = document.createElement('div');
          extraBox.className = 'property-extra is-hidden';
          extraImage = document.createElement('img');
          extraLabel = document.createElement('p');
          extraLabel.className = 'property-extra-label';
          extraBox.appendChild(extraImage);
          extraBox.appendChild(extraLabel);
          activeMedia.appendChild(extraBox);
        }
      }
      
      const previewCache = property.examples.map(() => null);
      let currentIndex = 0;
      
      const getExampleLabel = (example, idx) => {
        if (example && typeof example.label === 'string' && example.label.trim().length > 0) {
          return example.label.trim();
        }
        const variantLabel = Array.isArray(example?.variants) && example.variants[0] && example.variants[0].label;
        if (variantLabel) {
          return variantLabel;
        }
        const baseName = getPropertyDisplayName(property);
        return `${baseName} #${idx + 1}`;
      };
      
      const getVariantEntries = (example) => {
        if (Array.isArray(example?.variants) && example.variants.length) {
          return example.variants;
        }

        // For force direction examples
        if (property.hasForceDirections && example?.directions) {
          const selectedDir = currentForceDirection || example.directions.find(d => d.default) || example.directions[0];
          const baseVideo = example.baseVideo;
          const videoPath = '';

          return [{
            label: selectedDir.label,
            video: videoPath,
            meta: '',
            extraImage: null,
            extraImageLabel: property.extraImageLabel
          }];
        }

        return [{
          label: example?.variantLabel || example?.label,
          video: example?.video,
          meta: example?.variantMeta,
          extraImage: example?.extraImage,
          extraImageLabel: example?.extraImageLabel || property.extraImageLabel
        }];
      };
      
      const getPreviewVideoSrc = (example) => {
        if (!example) {
          return '';
        }
        if (typeof example.previewVideo === 'string') {
          return example.previewVideo;
        }
        if (property.hasForceDirections && example?.thumbnailVideo) {
          return example.thumbnailVideo;
        }
        const variants = getVariantEntries(example);
        if (variants.length && variants[0].video) {
          const filename = variants[0].video.split('/').pop();
          if (filename) {
            return `edit_videos/Input/${propertySlug}/${filename}`;
          }
          return variants[0].video;
        }
        if (example.video) {
          const filename = example.video.split('/').pop();
          if (filename) {
            return `edit_videos/Input/${propertySlug}/${filename}`;
          }
          return example.video;
        }
        return '';
      };
      
      const renderCarousel = () => {
        if (!carouselTrack) {
          return;
        }
        const total = property.examples.length;
        carouselTrack.innerHTML = '';
        if (prevButton) prevButton.disabled = total <= 1;
        if (nextButton) nextButton.disabled = total <= 1;
        if (!total) {
          return;
        }
        
        property.examples.forEach((example, dataIndex) => {
          const card = document.createElement('button');
          card.type = 'button';
          card.className = 'thumbnail-card';
          card.setAttribute('aria-label', `Show ${getExampleLabel(example, dataIndex)}`);
          
          if (dataIndex === currentIndex) {
            card.classList.add('current');
            card.disabled = true;
            card.setAttribute('aria-current', 'true');
          }
          
          const imageWrapper = document.createElement('div');
          imageWrapper.className = 'thumbnail-image';
          
          let canvas = previewCache[dataIndex];
          if (!canvas) {
            canvas = document.createElement('canvas');
            previewCache[dataIndex] = canvas;
            card.classList.add('loading');
            createThumbnailFromVideo(getPreviewVideoSrc(example), canvas, card, example.thumbnailTime);
          }
          imageWrapper.appendChild(canvas);
          card.appendChild(imageWrapper);
          
          const labelSpan = document.createElement('span');
          labelSpan.textContent = getExampleLabel(example, dataIndex);
          card.appendChild(labelSpan);
          
          if (dataIndex !== currentIndex) {
            card.addEventListener('click', () => {
              setActiveExample(dataIndex);
            });
          }
          
          carouselTrack.appendChild(card);
        });
      };
      
      const renderDots = () => {
        if (!dotsContainer) {
          return;
        }
        dotsContainer.innerHTML = '';
        property.examples.forEach((example, index) => {
          const dot = document.createElement('button');
          dot.className = 'property-dot' + (index === currentIndex ? ' is-active' : '');
          dot.setAttribute('aria-label', `Go to ${getExampleLabel(example, index)}`);
          dot.addEventListener('click', () => setActiveExample(index));
          dotsContainer.appendChild(dot);
        });
      };
      
      const shiftCarousel = (delta) => {
        if (!property.examples.length) {
          return;
        }
        setActiveExample(currentIndex + delta);
      };
      
      if (prevButton) {
        prevButton.addEventListener('click', () => shiftCarousel(-1));
      }
      if (nextButton) {
        nextButton.addEventListener('click', () => shiftCarousel(1));
      }
      
      const updateVariantSlot = (variantData, rowIndex) => {
        const fallbackLabel = layoutMode === 'paired'
          ? (rowIndex === 0 ? 'High value' : 'Low value')
          : (variantData?.label || getPropertyDisplayName(property) || 'Example');
        const rowLabelText = (variantData?.label || fallbackLabel || '').trim();
        const badgeText = (variantData?.badge || rowLabelText || '').replace(/value/i, '').trim();
        
        methodEntries.forEach(entry => {
          const slotRef = entry.variantRefs[rowIndex];
          if (!slotRef) {
            return;
          }
          if (!variantData || !variantData.video) {
            slotRef.slot.classList.add('is-hidden');
            if (slotRef.source) {
              slotRef.source.removeAttribute('src');
            }
            slotRef.video.load();
            return;
          }
          slotRef.slot.classList.remove('is-hidden');
          slotRef.tagEl.textContent = badgeText;
          slotRef.tagEl.classList.add('is-hidden');
          
          let videoSrc = '';
          const filename = variantData.video ? variantData.video.split('/').pop() : '';
          videoSrc = filename ? `edit_videos/${entry.config.key}/${propertySlug}/${filename}` : '';
          
          if (slotRef.source) {
            slotRef.source.src = videoSrc;
          }
          slotRef.video.load();
          slotRef.video.playbackRate = DEFAULT_VIDEO_SPEED;
          if (typeof slotRef.video.play === 'function') {
            slotRef.video.play().catch(() => {});
          }
        });
        
        const metaEl = variantMetaEls[rowIndex];
        if (metaEl) {
          if (variantData && variantData.meta) {
            metaEl.textContent = variantData.meta;
            metaEl.classList.remove('is-hidden');
          } else {
            metaEl.textContent = '';
            metaEl.classList.add('is-hidden');
          }
        }
        
        if (extraBox && extraImage && extraLabel && rowIndex === 0) {
          if (variantData && variantData.extraImage) {
            extraImage.src = variantData.extraImage;
            extraImage.alt = variantData.extraImageLabel || property.extraImageLabel || `${rowLabelText} reference`;
            extraLabel.textContent = variantData.extraImageLabel || property.extraImageLabel || 'Reference image';
            extraBox.classList.remove('is-hidden');
          } else {
            extraImage.removeAttribute('src');
            extraBox.classList.add('is-hidden');
          }
        }
      };

      const renderForceDirections = (example) => {
        if (!forceDirectionSelector || !property.hasForceDirections || !example?.directions) {
          if (forceDirectionSelector) {
            forceDirectionSelector.classList.add('is-hidden');
          }
          return;
        }

        // Show the selector
        forceDirectionSelector.classList.remove('is-hidden');

        // Set thumbnail image - use the first frame (_ff.png) from the default direction
        if (forceThumbnailImg && example.baseVideo && example.directions) {
          const defaultDir = example.directions.find(d => d.default) || example.directions[0];
          forceThumbnailImg.removeAttribute('src');
          forceThumbnailImg.alt = 'Force direction scene';
        }

        // Clear existing arrows
        const existingArrows = forceThumbnailContainer.querySelectorAll('.force-arrow');
        existingArrows.forEach(arrow => arrow.remove());

        if (!forceThumbnailContainer) return;

        // Add arrows for each direction
        example.directions.forEach((direction, idx) => {
          const arrow = document.createElement('button');
          arrow.className = 'force-arrow';
          arrow.type = 'button';
          arrow.dataset.angle = direction.angle;
          arrow.dataset.force = direction.force;
          arrow.dataset.directionIndex = idx;
          arrow.style.left = `${direction.x}%`;
          arrow.style.top = `${direction.y}%`;
          arrow.setAttribute('aria-label', direction.label);
          arrow.title = direction.label;

          // Create arrow image
          const arrowImg = document.createElement('img');

          // Check if this is the currently selected direction
          const isSelected = currentForceDirection
            ? (currentForceDirection.angle === direction.angle && currentForceDirection.force === direction.force)
            : direction.default;

          // Use red arrow for selected, blue for others
          arrowImg.src = isSelected ? 'static/images/red_arrow.png' : 'static/images/yellow_arrow.png';
          arrowImg.alt = 'Force direction arrow';

          // Calculate rotation based on angle
          // Arrow images point right by default, so 0° in our system = 0° rotation
          // The angle from the data represents the force direction
          arrowImg.style.transform = `rotate(${direction.angle}deg)`;

          arrow.appendChild(arrowImg);

          if (isSelected) {
            arrow.classList.add('selected');
            if (forceDirectionInfo) {
              forceDirectionInfo.textContent = direction.label;
            }
          }

          // Add click handler
          arrow.addEventListener('click', () => {
            currentForceDirection = direction;

            // Update all arrows - change images and selected class
            forceThumbnailContainer.querySelectorAll('.force-arrow').forEach(a => {
              a.classList.remove('selected');
              const img = a.querySelector('img');
              if (img) {
                img.src = 'static/images/yellow_arrow.png';
              }
            });

            arrow.classList.add('selected');
            arrowImg.src = 'static/images/red_arrow.png';

            // Update info display
            if (forceDirectionInfo) {
              forceDirectionInfo.textContent = direction.label;
            }

            // Refresh the videos with new direction
            const variantEntries = getVariantEntries(example);
            for (let rowIndex = 0; rowIndex < variantRowCount; rowIndex += 1) {
              const variantData = variantEntries[rowIndex];
              updateVariantSlot(variantData, rowIndex);
            }
          });

          forceThumbnailContainer.appendChild(arrow);
        });
      };

      const setActiveExample = (idx) => {
        if (!property.examples.length) {
          return;
        }
        const total = property.examples.length;
        currentIndex = ((idx % total) + total) % total;
        const example = property.examples[currentIndex];
        if (!example) {
          return;
        }

        const longTailInputOursOnly = property.name === 'long_tail';
        const alwaysShowCosmos = property.name === 'safety_critical';
        const alwaysShowFullBaselines = property.name === 'more_baselines';
        const visibleMethodKeys = alwaysShowCosmos
          ? ['Input', 'Cosmos', 'Ours']
          : COMPACT_COMPARE_KEYS;
        const showFullBaselines = layoutMode === 'single' && comparisonPromptBox && alwaysShowFullBaselines && !longTailInputOursOnly && !alwaysShowCosmos;
        methodEntries.forEach((entry) => {
          const visible = showFullBaselines || visibleMethodKeys.includes(entry.config.key);
          entry.column.classList.toggle('is-hidden', !visible);
        });
        if (layoutMode === 'single' && comparisonPromptBox) {
          methodGrid.classList.toggle('comparison-compact', !showFullBaselines && !alwaysShowCosmos);
        methodGrid.classList.toggle('comparison-baselines-6', showFullBaselines);
        }

        // Reset force direction when switching examples
        if (property.hasForceDirections && example?.directions) {
          currentForceDirection = example.directions.find(d => d.default) || example.directions[0];
        }

        const variantEntries = getVariantEntries(example);
        for (let rowIndex = 0; rowIndex < variantRowCount; rowIndex += 1) {
          const variantData = variantEntries[rowIndex];
          updateVariantSlot(variantData, rowIndex);
        }

        if (comparisonPromptBox) {
          const promptText = typeof example.prompt === 'string' && example.prompt.trim().length
            ? example.prompt.trim()
            : '(Prompt placeholder — replace with editing instruction.)';
          comparisonPromptBox.textContent = promptText;
        }

        const labelText = getExampleLabel(example, currentIndex);
        if (sharedLabel) {
          sharedLabel.textContent = labelText;
        }
        if (sharedMeta) {
          const metaText = typeof example.meta === 'string' ? example.meta : '';
          if (metaText) {
            sharedMeta.textContent = metaText;
            sharedMeta.classList.remove('is-hidden');
          } else {
            sharedMeta.textContent = '';
            sharedMeta.classList.add('is-hidden');
          }
        }

        // Render force direction selector if applicable
        renderForceDirections(example);

        renderCarousel();
        renderDots();
      };
      
      setActiveExample(0);
      });
    });
  }

  const COMPOUND_EDITING_EXAMPLES = [
    { id: 'scene22_20260502_084236', instructionText: 'replace agent 2 with an ambulance, make ego overtake agent 2 which yields, and make it rain' },
    { id: 'scene22_20260502_090456', instructionText: 'remove agent 2, make ego turn right and make pedestrian 11 yield to ego at the intersection, and make it foggy' },
    { id: 'scene22_20260503_194154', instructionText: 'ego going straight, in leftmost lane, crossing an intersection, slowing down, and make it night' },
    { id: 'scene22_20260503_195537', instructionText: 'remove car 2, and make it foggy' },
    { id: 'scene228_20260503_200936', instructionText: 'car 0 slowing down, and make it rainy' },
    { id: 'scene228_20260503_203126', instructionText: 'remove car 0, and make it foggy' },
    { id: 'scene228_20260503_203752', instructionText: 'car 8 turning left, in middle lane, speeding up, and make it snowy winter' },
    { id: 'scene40_20260503_200313', instructionText: 'ego going straight, changing lanes from middle lane to leftmost lane, speeding up, and make it snowy winter' },
    { id: 'scene40_20260503_195032', instructionText: 'remove car 0, and make it autumn' }
  ];

  const getCompoundMediaPath = (exampleId, filename) =>
    `simvp_videos/${exampleId}/${filename}`;

  const createCompoundVideo = (src) => {
    const video = document.createElement('video');
    video.controls = true;
    video.loop = true;
    video.muted = true;
    video.playsInline = true;
    video.autoplay = true;
    video.preload = 'metadata';

    const source = document.createElement('source');
    source.src = src;
    source.type = 'video/mp4';
    video.appendChild(source);

    video.addEventListener('loadedmetadata', () => {
      video.playbackRate = DEFAULT_VIDEO_SPEED;
      if (typeof video.play === 'function') {
        video.play().catch(() => {});
      }
    });

    return video;
  };

  const createCompoundVideoPanel = (label, src) => {
    const panel = document.createElement('div');
    panel.className = 'compound-video-panel';

    const caption = document.createElement('p');
    caption.className = 'compound-video-label';
    caption.textContent = label;

    const wrapper = document.createElement('div');
    wrapper.className = 'video-wrapper';
    wrapper.appendChild(createCompoundVideo(src));

    panel.appendChild(caption);
    panel.appendChild(wrapper);
    return panel;
  };

  const createCompoundCard = (title, panels, instructionText) => {
    const card = document.createElement('article');
    card.className = 'compound-card';

    const heading = document.createElement('h3');
    heading.className = 'compound-card-title';
    heading.textContent = title;
    card.appendChild(heading);

    if (typeof instructionText === 'string') {
      const instruction = document.createElement('p');
      instruction.className = 'compound-instruction';
      instruction.textContent = instructionText;
      card.appendChild(instruction);
    }

    const pair = document.createElement('div');
    pair.className = 'compound-video-pair';
    panels.forEach((panel) => pair.appendChild(panel));
    card.appendChild(pair);

    return card;
  };

  const createCompoundExampleRow = (exampleId, instructionText) => {
    const row = document.createElement('div');
    row.className = 'compound-example-row';

    const originalPanels = [
      createCompoundVideoPanel('Video', getCompoundMediaPath(exampleId, 'driving_log.mp4')),
      createCompoundVideoPanel('Trajectory (Original)', getCompoundMediaPath(exampleId, 'trajectory_original.mp4'))
    ];

    const generatedPanels = [
      createCompoundVideoPanel('Video', getCompoundMediaPath(exampleId, 'generated_video.mp4')),
      createCompoundVideoPanel('Trajectory (Ours)', getCompoundMediaPath(exampleId, 'trajectory_modified.mp4'))
    ];

    row.appendChild(createCompoundCard('Original Reference', originalPanels));
    row.appendChild(createCompoundCard('Our Edit', generatedPanels, instructionText));
    return row;
  };

  const renderCompoundEditingGallery = () => {
    const root = document.getElementById('compound-editing-root');
    if (!root) {
      return;
    }

    root.innerHTML = `
      <div class="property-carousel-wrapper">
        <div class="property-carousel-nav">
          <button class="fine-control-nav property-nav-btn is-prev" aria-label="Previous compound example">&lsaquo;</button>
          <div class="property-nav-track">
            <div class="thumbnail-track"></div>
          </div>
          <button class="fine-control-nav property-nav-btn is-next" aria-label="Next compound example">&rsaquo;</button>
        </div>
        <div class="property-dots"></div>
      </div>
      <div class="compound-active-row"></div>
    `;

    const track = root.querySelector('.thumbnail-track');
    const prevButton = root.querySelector('.property-nav-btn.is-prev');
    const nextButton = root.querySelector('.property-nav-btn.is-next');
    const dotsContainer = root.querySelector('.property-dots');
    const activeRow = root.querySelector('.compound-active-row');
    if (!track || !prevButton || !nextButton || !dotsContainer || !activeRow) {
      return;
    }

    const examples = COMPOUND_EDITING_EXAMPLES;
    if (!examples.length) {
      return;
    }

    const cardWidth = 160;
    const cardGap = 12;
    let currentIndex = 0;

    const scrollToCurrent = () => {
      const maxScroll = Math.max(0, track.scrollWidth - track.clientWidth);
      const target = Math.min(currentIndex * (cardWidth + cardGap), maxScroll);
      track.scrollTo({ left: target, behavior: 'smooth' });
    };

    const setActiveExample = (index) => {
      currentIndex = Math.max(0, Math.min(index, examples.length - 1));
      const selected = examples[currentIndex];
      activeRow.innerHTML = '';
      activeRow.appendChild(createCompoundExampleRow(selected.id, selected.instructionText));

      const cards = track.querySelectorAll('.thumbnail-card');
      cards.forEach((card, idx) => {
        const isCurrent = idx === currentIndex;
        card.classList.toggle('current', isCurrent);
        card.disabled = isCurrent;
        if (isCurrent) {
          card.setAttribute('aria-current', 'true');
        } else {
          card.removeAttribute('aria-current');
        }
      });
      const dots = dotsContainer.querySelectorAll('.property-dot');
      dots.forEach((dot, idx) => dot.classList.toggle('is-active', idx === currentIndex));

      prevButton.disabled = currentIndex === 0;
      nextButton.disabled = currentIndex >= examples.length - 1;
      scrollToCurrent();
    };

    examples.forEach((example, index) => {
      const thumbnailSrc = getCompoundMediaPath(example.id, 'generated_video.mp4');
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'thumbnail-card';
      card.setAttribute('aria-label', `Compound example ${index + 1}`);

      const thumbWrapper = document.createElement('div');
      thumbWrapper.className = 'thumbnail-image';
      const canvas = document.createElement('canvas');
      thumbWrapper.appendChild(canvas);
      card.appendChild(thumbWrapper);

      const label = document.createElement('span');
      label.textContent = `Example ${index + 1}`;
      card.appendChild(label);

      createThumbnailFromVideo(thumbnailSrc, canvas, card, 0.2);
      card.addEventListener('click', () => setActiveExample(index));
      track.appendChild(card);

      const dot = document.createElement('button');
      dot.type = 'button';
      dot.className = 'property-dot';
      dot.setAttribute('aria-label', `Go to compound example ${index + 1}`);
      dot.addEventListener('click', () => setActiveExample(index));
      dotsContainer.appendChild(dot);
    });

    prevButton.addEventListener('click', () => setActiveExample(currentIndex - 1));
    nextButton.addEventListener('click', () => setActiveExample(currentIndex + 1));

    setActiveExample(0);
  };
  
  document.addEventListener('DOMContentLoaded', function() {
    buildPropertyGallery();
    renderCompoundEditingGallery();
    
    const allVideos = document.querySelectorAll('video');
    allVideos.forEach(video => {
      video.playbackRate = DEFAULT_VIDEO_SPEED;
    });
    
    const examples = document.querySelectorAll('.example-container');
    let sliderCount = 0;
    examples.forEach(example => {
      const speedSlider = example.querySelector('.speed-slider');
      if (!speedSlider) {
        return;
      }
      
      sliderCount += 1;
      const exampleId = `example-${sliderCount}`;
      example.id = exampleId;
      
      const videos = example.querySelectorAll('video');
      const speedValue = example.querySelector('.speed-value');
      
      speedSlider.addEventListener('input', function() {
        const speed = parseFloat(this.value);
        if (speedValue) {
          speedValue.textContent = speed.toFixed(1) + 'x';
        }
        videos.forEach(video => {
          video.playbackRate = speed;
        });
      });
    });
  });
</script>

  <div class="container is-fluid has-text-centered">

  </div>
